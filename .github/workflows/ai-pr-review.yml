name: AI PR Review

# Modelo: review advisory con anthropics/claude-code-action (acción oficial).
# Autenticación por suscripción Pro/Max vía CLAUDE_CODE_OAUTH_TOKEN.
# La decisión de merge sigue siendo humana (branch protection).
# Same-repo only: PRs desde forks no disparan el review (guard explícito).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  guard-fork:
    runs-on: ubuntu-latest
    outputs:
      same_repo: ${{ steps.check.outputs.same_repo }}
    steps:
      - id: check
        name: Reject fork PRs unless explicitly enabled
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "same_repo=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PR proviene de un fork. AI review desactivado por seguridad. Ver docs/ai-pr-review-human-setup.md"
            exit 0
          fi
          echo "same_repo=true" >> "$GITHUB_OUTPUT"

  ai-review:
    needs: guard-fork
    # Corre en eventos de PR. En el evento `labeled`, sólo si la label fue `review-this`
    # (evita reejecutar el review cada vez que alguien aplica una label cualquiera).
    if: >
      needs.guard-fork.outputs.same_repo == 'true' &&
      (github.event.action != 'labeled' || github.event.label.name == 'review-this')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR has Evidence section
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== DEBUG: PR_BODY (con cat -A para ver whitespace) ==="
          printf '%s\n' "$PR_BODY" | cat -A | head -30 || true
          echo "=== DEBUG: grep candidates (líneas que empiezan con ##) ==="
          printf '%s\n' "$PR_BODY" | grep -nE "^[[:space:]]*##" || echo "(ninguna línea matchea)"
          echo "=== DEBUG: grep target final ==="
          printf '%s\n' "$PR_BODY" | grep -iE "^[[:space:]]*##[[:space:]]+Evidence" || echo "(no match para Evidence)"
          echo "=== END DEBUG ==="

          # Regex tolerante a leading whitespace (copy-paste desde IDEs/markdown
          # con frecuencia agrega 2 espacios) y a múltiples espacios entre `##`
          # y `Evidence`. El header sigue siendo case-insensitive.
          if ! printf '%s\n' "$PR_BODY" | grep -qiE "^[[:space:]]*##[[:space:]]+Evidence"; then
            echo "::error::El PR no incluye la sección obligatoria '## Evidence'. Ver .github/pull_request_template.md"
            exit 1
          fi

      - name: Run Claude Code PR Review
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1 — 2025-08-26
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Sos el revisor automatizado de este Pull Request. Tu rol es advisory:
            comentás, no aprobás merges.

            INSUMOS OBLIGATORIOS A LEER ANTES DE COMENTAR:
            1. `Agente-IA-Desarrollo-ABAP/AGENTS.md` — contrato del arnés y principios.
            2. `Agente-IA-Desarrollo-ABAP/.agents/skills/custom-codereview-guide.md` — guía
               de review específica del producto (categorías, severidades, señales rojas
               ABAP, formato de comentario en §6).
            3. `Agente-IA-Desarrollo-ABAP/prd.md` §6 — los 6 Principios No Negociables.

            TAREA:
            - Revisá el diff del PR aplicando la guía custom.
            - Verificá los 6 Principios del PRD (§2 de la guía).
            - Marcá zonas sensibles del repo (§3 de la guía): `CLAUDE.md`,
              `.claude/agents/*`, `.claude/commands/pipeline-abap.md`,
              `docs/formato-fd-generico.md`, `.github/workflows/`, etc.
            - Señales rojas universales (§4) y ABAP-específicas (§5).
            - Verificá la sección `## Evidence` (§7): comandos, output, AC marcados.

            FORMATO DE CADA COMENTARIO SUSTANTIVO (estricto, §6 de la guía):
            `[<categoría> · <severidad>] <archivo>:<línea>` + qué está mal + sugerencia
            accionable + referencia (principio PRD, sección CLAUDE.md, doc).

            REGLAS:
            - Señal alta, ruido bajo. Mejor 3 comentarios accionables que 30 nitpicks.
            - Si el PR es trivial, un comentario aprobatorio basta.
            - No reescribas el PR. No marques approved. No comentes estilo subjetivo.
            - Si tenés dudas, marcá `[needs-human · minor]` con la pregunta.
            - Idioma: español.
          claude_args: |
            --allowed-tools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*)"
